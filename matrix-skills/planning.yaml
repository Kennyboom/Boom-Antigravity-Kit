      agents: [planner, business-analyst]
      profiles: ["planning:*"]
    description: "Specification mining and extraction"

  - skill_id: behavioral-modes
    category: utility
    priority_score: 6
    relevance_mapping:
      agents: [tech-lead, planner]
      profiles: ["planning:*", "architecture:*"]
    description: "AI operational modes adaptation"
