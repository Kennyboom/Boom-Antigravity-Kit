    category: core
    priority_score: 9
    relevance_mapping:
      agents: [planner]
      profiles: ["planning:analysis"]
    description: "Structured task planning, dependencies, verification criteria"

  - skill_id: planning
    category: core
    priority_score: 9
    relevance_mapping:
      agents: [planner, brainstormer, business-analyst, project-manager, tech-lead]
      profiles: ["planning:*"]
    description: "Technical solution design, scalable and maintainable"

  - skill_id: sequential-thinking
    category: core
    priority_score: 8
    relevance_mapping:
      agents: [planner, researcher, brainstormer]
      profiles: ["planning:*", "research:*"]
    description: "Multi-step analysis, revision, hypothesis verification"

  - skill_id: problem-solving
    category: core
    priority_score: 8
    relevance_mapping:
      agents: [planner, brainstormer]
      profiles: ["planning:analysis", "planning:discovery"]
    description: "Complexity spirals, innovation blocks, meta-patterns"

  - skill_id: brainstorming
    category: core
    priority_score: 8
    relevance_mapping:
      agents: [brainstormer, business-analyst]
      profiles: ["planning:discovery", "planning:business"]
